<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartTrading — Track Record</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B0D12;--surface:#161B25;--surface2:#1E2636;--border:#252D3D;--border2:#2E3A50;--buy:#00C896;--hold:#F5A623;--sell:#FF4455;--text:#EDF2FF;--muted:#8B95A8;--dim:#4A5568;--mono:'JetBrains Mono','Courier New',monospace;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;max-width:430px;margin:0 auto;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:600;letter-spacing:1px;}.logo span{color:var(--buy);}
.section{padding:14px 16px;}
.section-label{font-size:10px;font-weight:500;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
.stat-num{font-family:var(--mono);font-size:20px;font-weight:600;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.wr-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.wr-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.wr-title{font-size:12px;color:var(--muted);}
.wr-pct{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--buy);}
.wr-bar-bg{background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px;}
.wr-bar-fill{height:100%;border-radius:4px;background:var(--buy);}
.wr-sub{font-size:11px;color:var(--dim);}
.wr-sub span{color:var(--muted);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SMART<span>TRADING</span></div>
  <div style="font-size:11px;color:var(--dim);font-family:var(--mono);">30 HARI TERAKHIR</div>
</div>
<div class="section">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--buy);">47</div><div class="stat-lbl">Total Sinyal</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--buy);">31</div><div class="stat-lbl">WIN</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--sell);">16</div><div class="stat-lbl">LOSS</div></div>
  </div>
  <div class="wr-card">
    <div class="wr-head"><div class="wr-title">Win Rate 30 Hari</div><div class="wr-pct">66%</div></div>
    <div class="wr-bar-bg"><div class="wr-bar-fill" style="width:66%;"></div></div>
    <div class="wr-sub">Target: <span>60%</span> &nbsp;&nbsp; Avg Return WIN: <span style="color:var(--buy);">+3.8%</span> &nbsp;&nbsp; Avg Loss: <span style="color:var(--sell);">-1.9%</span></div>
  </div>
</div>

<style>
.sector-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.sector-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.sector-row:last-child{border-bottom:none;}
.sector-name{font-size:12px;color:var(--muted);width:90px;flex-shrink:0;}
.sector-bar-bg{flex:1;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden;}
.sector-bar-fill{height:100%;border-radius:3px;}
.sector-pct{font-family:var(--mono);font-size:11px;width:36px;text-align:right;flex-shrink:0;}
.sector-wl{font-size:10px;color:var(--dim);width:32px;text-align:right;flex-shrink:0;}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.chip{padding:4px 10px;border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;background:transparent;}
.chip.active{background:rgba(0,200,150,0.15);border-color:var(--buy);color:var(--buy);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.sig-table{width:100%;border-collapse:collapse;}
.sig-table th{padding:8px 10px;font-size:10px;color:var(--dim);font-weight:500;letter-spacing:0.8px;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
.sig-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.sig-table tr:last-child td{border-bottom:none;}
.t-ticker{font-family:var(--mono);font-weight:600;}
.t-date{font-size:10px;color:var(--dim);}
.side-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;}
.s-buy{background:rgba(0,200,150,0.15);color:var(--buy);}
.s-sell{background:rgba(255,68,85,0.15);color:var(--sell);}
.res-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;font-family:var(--mono);}
.r-win{background:rgba(0,200,150,0.15);color:var(--buy);}
.r-loss{background:rgba(255,68,85,0.15);color:var(--sell);}
.r-open{background:rgba(245,166,35,0.12);color:var(--hold);}
.nav-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;}
.nav-item{flex:1;padding:10px 0;text-align:center;font-size:10px;color:var(--dim);cursor:pointer;}
.nav-item.active{color:var(--buy);}
.nav-icon{font-size:18px;display:block;margin-bottom:2px;}
</style>
<div class="section" style="padding-top:0;">
  <div class="section-label">Akurasi per Sektor</div>
  <div class="sector-wrap" id="sectors"></div>
  <div class="section-label" style="margin-top:16px;">Riwayat Sinyal</div>
  <div class="filter-row">
    <button class="chip active" onclick="filter('all',this)">Semua</button>
    <button class="chip" onclick="filter('WIN',this)">WIN</button>
    <button class="chip" onclick="filter('LOSS',this)">LOSS</button>
    <button class="chip" onclick="filter('OPEN',this)">Masih Buka</button>
  </div>
  <div class="table-wrap">
    <table class="sig-table">
      <thead><tr><th>SAHAM</th><th>SISI</th><th>ENTRY/EXIT</th><th>RETURN</th><th>HASIL</th></tr></thead>
      <tbody id="sig-body"></tbody>
    </table>
  </div>
</div>
<div style="height:64px;"></div>
<div class="nav-bottom">
  <div class="nav-item" onclick="location.href='home.html'"><span class="nav-icon">&#8962;</span>Home</div>
  <div class="nav-item" onclick="location.href='watchlist.html'"><span class="nav-icon">&#9776;</span>Watchlist</div>
  <div class="nav-item" onclick="location.href='deepdive.html'"><span class="nav-icon">&#9740;</span>Deep Dive</div>
  <div class="nav-item" onclick="location.href='globalpulse.html'"><span class="nav-icon">&#127758;</span>Global</div>
  <div class="nav-item active" onclick="location.href='alert.html'"><span class="nav-icon">&#9888;</span>Alert</div>
</div>

<script>
const sectors=[
  {name:'Perbankan',win:12,total:16},
  {name:'Telko',win:7,total:10},
  {name:'Konsumer',win:5,total:8},
  {name:'Energi',win:4,total:7},
  {name:'Infrastruktur',win:3,total:6},
];
const signals=[
  {ticker:'BBCA',side:'BUY',entry:9200,exit:9480,ret:3.0,result:'WIN',date:'01 Apr'},
  {ticker:'TLKM',side:'BUY',entry:3350,exit:3200,ret:-4.5,result:'LOSS',date:'01 Apr'},
  {ticker:'BRIS',side:'BUY',entry:2300,exit:2460,ret:7.0,result:'WIN',date:'31 Mar'},
  {ticker:'ASII',side:'BUY',entry:5650,exit:null,ret:null,result:'OPEN',date:'02 Apr'},
  {ticker:'BMRI',side:'BUY',entry:5400,exit:5580,ret:3.3,result:'WIN',date:'30 Mar'},
  {ticker:'UNVR',side:'SELL',entry:4200,exit:4050,ret:3.6,result:'WIN',date:'29 Mar'},
  {ticker:'GOTO',side:'BUY',entry:68,exit:64,ret:-5.9,result:'LOSS',date:'28 Mar'},
  {ticker:'ICBP',side:'BUY',entry:10200,exit:10650,ret:4.4,result:'WIN',date:'27 Mar'},
];
document.getElementById('sectors').innerHTML=sectors.map(s=>{
  const p=Math.round(s.win/s.total*100);
  const c=p>=70?'var(--buy)':p>=50?'var(--hold)':'var(--sell)';
  return`<div class="sector-row"><div class="sector-name">${s.name}</div><div class="sector-bar-bg"><div class="sector-bar-fill" style="width:${p}%;background:${c};"></div></div><div class="sector-pct" style="color:${c};">${p}%</div><div class="sector-wl">${s.win}/${s.total}</div></div>`;
}).join('');
function renderTable(f){
  const rows=f==='all'?signals:signals.filter(s=>s.result===f);
  document.getElementById('sig-body').innerHTML=rows.length?rows.map(s=>{
    const eS=s.entry>=1000?(s.entry/1000).toFixed(1)+'k':s.entry;
    const xS=s.exit?(s.exit>=1000?(s.exit/1000).toFixed(1)+'k':s.exit):'—';
    const rS=s.ret!==null?(s.ret>0?'+':'')+s.ret.toFixed(1)+'%':'—';
    const rC=s.ret>0?'style="color:var(--buy);"':s.ret<0?'style="color:var(--sell);"':'';
    const sC=s.side==='BUY'?'s-buy':'s-sell';
    const rc=s.result==='WIN'?'r-win':s.result==='LOSS'?'r-loss':'r-open';
    return`<tr><td class="t-ticker">${s.ticker}<div class="t-date">${s.date}</div></td><td><span class="side-tag ${sC}">${s.side}</span></td><td style="font-family:var(--mono);font-size:11px;color:var(--muted);">${eS}<br><span style="color:var(--dim);">${xS}</span></td><td ${rC} style="font-family:var(--mono);font-size:12px;">${rS}</td><td><span class="res-tag ${rc}">${s.result}</span></td></tr>`;
  }).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:24px;">Tidak ada data</td></tr>';
}
function filter(f,el){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');renderTable(f);
}
renderTable('all');
</script>
</body>
</html>
