<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartTrading — Price Alerts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B0D12;--surface:#161B25;--surface2:#1E2636;--border:#252D3D;--border2:#2E3A50;--buy:#00C896;--hold:#F5A623;--sell:#FF4455;--text:#EDF2FF;--muted:#8B95A8;--dim:#4A5568;--mono:'JetBrains Mono','Courier New',monospace;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;max-width:430px;margin:0 auto;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:600;letter-spacing:1px;}.logo span{color:var(--buy);}
.badge{font-family:var(--mono);font-size:11px;background:var(--sell);color:#fff;padding:2px 8px;border-radius:10px;}
.section{padding:14px 16px;}
.section-label{font-size:10px;font-weight:500;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
.add-btn{width:100%;padding:10px;background:rgba(0,200,150,0.1);border:1px dashed var(--buy);border-radius:8px;color:var(--buy);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.add-form{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:14px;display:none;}
.add-form.open{display:block;}
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.form-label{font-size:11px;color:var(--muted);width:52px;flex-shrink:0;}
.form-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;}
.form-input:focus{border-color:var(--buy);}
.form-select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;}
.form-btns{display:flex;gap:8px;margin-top:4px;}
.btn-primary{flex:1;padding:8px;background:var(--buy);border:none;border-radius:6px;color:#0B0D12;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel{flex:1;padding:8px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SMART<span>TRADING</span></div>
  <div class="badge" id="alert-badge">2 Aktif</div>
</div>
<div class="section">
  <div class="add-btn" id="add-btn" onclick="toggleForm()">
    <span style="font-size:16px;">+</span> Set Price Alert
  </div>
  <div id="add-form" class="add-form">
    <div class="form-row">
      <div class="form-label">Saham</div>
      <input id="f-ticker" class="form-input" placeholder="contoh: BBCA" maxlength="6" oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <div class="form-row">
      <div class="form-label">Kondisi</div>
      <select id="f-cond" class="form-select">
        <option value="above">Harga naik di atas</option>
        <option value="below">Harga turun di bawah</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-label">Target</div>
      <input id="f-price" class="form-input" placeholder="contoh: 9500" type="number"/>
    </div>
    <div class="form-row">
      <div class="form-label">Catatan</div>
      <input id="f-note" class="form-input" placeholder="opsional"/>
    </div>
    <div class="form-btns">
      <button class="btn-cancel" onclick="toggleForm()">Batal</button>
      <button class="btn-primary" onclick="addAlert()">Simpan Alert</button>
    </div>
  </div>

<style>
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.alert-card.triggered{border-left:3px solid var(--buy);}
.alert-card.active{border-left:3px solid var(--hold);}
.alert-card.expired{border-left:3px solid var(--dim);opacity:0.6;}
.alert-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.dot-triggered{background:var(--buy);}
.dot-active{background:var(--hold);}
.dot-expired{background:var(--dim);}
.alert-body{flex:1;}
.alert-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.alert-ticker{font-family:var(--mono);font-size:13px;font-weight:600;}
.alert-status{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;letter-spacing:0.5px;}
.status-triggered{background:rgba(0,200,150,0.15);color:var(--buy);}
.status-active{background:rgba(245,166,35,0.15);color:var(--hold);}
.status-expired{background:rgba(74,85,104,0.3);color:var(--muted);}
.alert-cond{font-size:12px;color:var(--muted);margin-bottom:3px;}
.alert-cond span{color:var(--text);}
.alert-time{font-size:11px;color:var(--dim);}
.alert-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0 2px;}
.alert-del:hover{color:var(--sell);}
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.log-row{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.log-row:last-child{border-bottom:none;}
.log-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.log-text{flex:1;font-size:12px;color:var(--muted);line-height:1.5;}
.log-text strong{color:var(--text);}
.log-time{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0;}
.nav-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;}
.nav-item{flex:1;padding:10px 0;text-align:center;font-size:10px;color:var(--dim);cursor:pointer;}
.nav-item.active{color:var(--buy);}
.nav-icon{font-size:18px;display:block;margin-bottom:2px;}
</style>
  <div class="section-label">Alert Aktif</div>
  <div id="alerts-list"></div>
  <div class="section-label" style="margin-top:16px;">Log Notifikasi</div>
  <div class="log-wrap" id="log-list"></div>
</div>
<div style="height:64px;"></div>
<div class="nav-bottom">
  <div class="nav-item" onclick="location.href='home.html'"><span class="nav-icon">&#8962;</span>Home</div>
  <div class="nav-item" onclick="location.href='watchlist.html'"><span class="nav-icon">&#9776;</span>Watchlist</div>
  <div class="nav-item" onclick="location.href='deepdive.html'"><span class="nav-icon">&#9740;</span>Deep Dive</div>
  <div class="nav-item" onclick="location.href='globalpulse.html'"><span class="nav-icon">&#127758;</span>Global</div>
  <div class="nav-item active"><span class="nav-icon">&#9888;</span>Alert</div>
</div>

<script>
let alerts=[
  {id:1,ticker:'BBCA',cond:'above',price:9500,note:'Breakout resistance',status:'active',time:'01 Apr, 14:22'},
  {id:2,ticker:'TLKM',cond:'below',price:3200,note:'Support test',status:'triggered',time:'02 Apr, 09:15'},
  {id:3,ticker:'ASII',cond:'above',price:5800,note:'',status:'expired',time:'28 Mar, 10:00'},
];
const logs=[
  {icon:'&#10003;',text:'<strong>TLKM</strong> menyentuh <strong>Rp 3.195</strong> — alert tercapai',time:'02 Apr 09:15',c:'var(--buy)'},
  {icon:'&#10003;',text:'<strong>BRIS</strong> menyentuh <strong>Rp 2.460</strong> — alert tercapai',time:'01 Apr 14:08',c:'var(--buy)'},
  {icon:'i',text:'Alert <strong>BMRI naik di atas 5.500</strong> dibuat',time:'01 Apr 11:30',c:'var(--hold)'},
  {icon:'&#215;',text:'Alert <strong>ASII naik di atas 5.800</strong> kedaluwarsa',time:'31 Mar 16:00',c:'var(--dim)'},
];
let nxtId=10;
function render(){
  const sorted=[...alerts.filter(a=>a.status!=='expired'),...alerts.filter(a=>a.status==='expired')];
  document.getElementById('alerts-list').innerHTML=sorted.length?sorted.map(a=>{
    const cL=a.cond==='above'?'naik di atas':'turun di bawah';
    const pS='Rp '+Number(a.price).toLocaleString('id-ID');
    return`<div class="alert-card ${a.status}">
      <div class="alert-dot dot-${a.status}"></div>
      <div class="alert-body">
        <div class="alert-top">
          <div class="alert-ticker">${a.ticker}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="alert-status status-${a.status}">${a.status.toUpperCase()}</span>
            ${a.status!=='triggered'?`<button class="alert-del" onclick="del(${a.id})">&#215;</button>`:''}
          </div>
        </div>
        <div class="alert-cond">Jika harga <span>${cL} ${pS}</span></div>
        ${a.note?`<div style="font-size:11px;color:var(--muted);margin-bottom:2px;">${a.note}</div>`:''}
        <div class="alert-time">${a.time}</div>
      </div></div>`;
  }).join(''):'<div style="text-align:center;padding:28px;color:var(--dim);">Belum ada alert. Tap "+ Set Price Alert".</div>';
  const ac=alerts.filter(a=>a.status==='active').length;
  const b=document.getElementById('alert-badge');
  b.textContent=ac+' Aktif';b.style.display=ac?'':'none';
  document.getElementById('log-list').innerHTML=logs.map(l=>`<div class="log-row"><div class="log-icon" style="color:${l.c};">${l.icon}</div><div class="log-text">${l.text}</div><div class="log-time">${l.time}</div></div>`).join('');
}
function toggleForm(){document.getElementById('add-form').classList.toggle('open');}
function del(id){alerts=alerts.filter(a=>a.id!==id);render();}
function addAlert(){
  const t=document.getElementById('f-ticker').value.trim().toUpperCase();
  const p=parseFloat(document.getElementById('f-price').value);
  if(!t||!p||t.length<2)return;
  const now=new Date();
  alerts.unshift({id:++nxtId,ticker:t,cond:document.getElementById('f-cond').value,price:p,note:document.getElementById('f-note').value.trim(),status:'active',time:now.getDate()+' Apr, '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')});
  document.getElementById('f-ticker').value='';document.getElementById('f-price').value='';document.getElementById('f-note').value='';
  document.getElementById('add-form').classList.remove('open');
  render();
}
render();
</script>
</body>
</html>
